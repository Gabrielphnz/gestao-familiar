<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada – Gestão Familiar</title>
  <meta http-equiv="refresh" content="5;url=/">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111827; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #1f2937; border-radius: 24px; padding: 40px 32px; max-width: 360px; width: 100%; text-align: center; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 56px; font-weight: 900; color: #3b82f6; margin-bottom: 8px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    p { color: #9ca3af; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    a { display: block; background: #2563eb; color: white; font-weight: 700; text-decoration: none; padding: 14px 24px; border-radius: 12px; font-size: 15px; transition: background 0.2s; }
    a:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔍</div>
    <h1>404</h1>
    <h2>Página não encontrada</h2>
    <p>O endereço que você buscou não existe. Você será redirecionado automaticamente em 5 segundos.</p>
    <a href="/">← Voltar ao app</a>
  </div>
</body>
</html>
